name: Build Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Předinstalační ověření oddělení DB migrací od deploye
        run: node scripts/check-no-auto-prod-db-push.mjs

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit testy
        run: npm run test:unit

      - name: RLS guard (dev mode)
        run: npm run check:rls

      - name: Build
        run: npm run build
