name: E2E Lifecycle Verification

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

jobs:
  lifecycle:
    name: Auth lifecycle nad lokální Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.84.2
          github-token: ${{ github.token }}

      - name: Start local Supabase
        run: supabase start

      - name: Export local Supabase environment
        shell: bash
        run: |
          eval "$(supabase status -o env \
            --override-name api.url=NEXT_PUBLIC_SUPABASE_URL \
            --override-name auth.anon_key=NEXT_PUBLIC_SUPABASE_ANON_KEY \
            --override-name auth.service_role_key=SUPABASE_SERVICE_ROLE_KEY)"

          echo "::add-mask::$SUPABASE_SERVICE_ROLE_KEY"
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY"
          } >> "$GITHUB_ENV"

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run authenticated reservation lifecycle
        run: npm run test:e2e:lifecycle:with-auth-bootstrap

      - name: Upload Playwright diagnostics from failed attempts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-lifecycle-failure
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup
